idea:
  title: LLM Pain
  domain: nlp
  hypothesis: 'There exist topics or features that large language models (LLMs) systematically
    avoid, which are not explicitly called out during post-training; these avoidance
    behaviors may arise from generalization to personas present in the training set.

    '
  background:
    description: 'LLMs do not experience pain, but if they did, it might be observable
      through systematic avoidance behaviors. However, such avoidance is confounded
      by explicit and implicit signals provided during post-training. This raises
      the question of whether there are things LLMs learn to avoid that are not explicitly
      specified in post-training, and if so, what these topics or features are and
      where they originate. It is hypothesized that these may come from generalization
      to personas in the training data, and understanding this phenomenon would be
      interesting.

      '
  metadata:
